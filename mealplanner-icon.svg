<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Meal Planner icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4845F"/>
      <stop offset="100%" stop-color="#E84D6A"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f4f0"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="135%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- "Meals" — generous space above card -->
  <text x="256" y="96"
    font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
    font-size="44" font-weight="700" fill="rgba(255,255,255,0.95)"
    text-anchor="middle" letter-spacing="1">Meals</text>

  <!-- Calendar card — smaller, better centered vertically -->
  <rect x="116" y="128" width="280" height="256" rx="24" fill="url(#card)" filter="url(#shadow)"/>

  <!-- Header band -->
  <rect x="116" y="128" width="280" height="68" rx="24" fill="#E95D5A"/>
  <rect x="116" y="172" width="280" height="24" fill="#E95D5A"/>

  <!-- Ring binders -->
  <rect x="186" y="114" width="18" height="34" rx="9" fill="rgba(255,255,255,0.92)"/>
  <rect x="308" y="114" width="18" height="34" rx="9" fill="rgba(255,255,255,0.92)"/>

  <!-- Month -->
  <text x="256" y="170"
    font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
    font-size="22" font-weight="600" fill="rgba(255,255,255,0.92)"
    text-anchor="middle" letter-spacing="3">JUNE</text>

  <!-- Big date -->
  <text x="256" y="310"
    font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
    font-size="128" font-weight="700" fill="#1a1a1a"
    text-anchor="middle">7</text>

  <!-- Weekday -->
  <text x="256" y="348"
    font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
    font-size="18" font-weight="500" fill="#E95D5A"
    text-anchor="middle" letter-spacing="2">SATURDAY</text>

  <!-- Bottom breathing room label — subtle tagline -->
  <text x="256" y="444"
    font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
    font-size="22" font-weight="500" fill="rgba(255,255,255,0.55)"
    text-anchor="middle" letter-spacing="1">Planner</text>

</svg>
