<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Meal Planner</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meal Planner">
  <meta name="theme-color" content="#085041">
  <link rel="apple-touch-icon" sizes="1024x1024" href="https://cdn.jsdelivr.net/gh/bradmartin79-ui/mealplannerpub@main/mealplanner-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      height: 100%;
      height: -webkit-fill-available;
    }
    body {
      width: 100%;
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
      background: #085041;
      /* Fill safe areas with app background color */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe id="app-frame" scrolling="yes" allowfullscreen></iframe>
  <script>
    function sizeFrame() {
      var h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
      document.getElementById("app-frame").style.height = h + "px";
    }
    window.addEventListener("resize", sizeFrame);
    window.addEventListener("orientationchange", sizeFrame);
    if (window.visualViewport) { window.visualViewport.addEventListener("resize", sizeFrame); }
    sizeFrame();
    document.getElementById("app-frame").src = "https://script.google.com/macros/s/AKfycbxvwLhpkTycZQBKxYWrVi1SV1hkZ0KOP5n-7fzyVXnLK3EXbFHZCu6_UAlPDqo7qaKI9A/exec?t=" + Date.now();
  </script>
</body>
</html>
