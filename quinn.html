  <meta charset="UTF-8">
  <link rel="preconnect" href="https://script.google.com">
  <link rel="dns-prefetch" href="https://script.google.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Quinn's Meals</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Quinn's Meals">
  <meta name="theme-color" content="#085041">
  <link rel="apple-touch-icon" sizes="1024x1024" href="https://cdn.jsdelivr.net/gh/bradmartin79-ui/mealplannerpub@main/mealplanner-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      height: 100%;
      height: -webkit-fill-available;
    }
    body {
      width: 100%;
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
      background: #085041;
      /* Fill safe areas with app background color */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #085041;
      z-index: 10;
      transition: opacity 300ms ease;
    }
    #loader.loader--hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader__spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: loader-spin 0.8s linear infinite;
    }
    @keyframes loader-spin { to { transform: rotate(360deg); } }
    .loader__text {
      margin-top: 14px;
      color: rgba(255,255,255,0.85);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      text-align: center;
      padding: 0 24px;
    }
    .loader__retry {
      margin-top: 16px;
      display: none;
      background: #ffffff;
      color: #085041;
      border: none;
      border-radius: 999px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
    }
    .loader--stalled .loader__retry { display: inline-block; }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader__spinner"></div>
    <div class="loader__text" id="loader-text">Loading…</div>
    <button class="loader__retry" id="loader-retry" onclick="location.reload()">Tap to retry</button>
  </div>
  <iframe id="app-frame" scrolling="yes" allowfullscreen fetchpriority="high"></iframe>
  <script>
    document.getElementById("app-frame").src = "https://script.google.com/macros/s/AKfycbxvwLhpkTycZQBKxYWrVi1SV1hkZ0KOP5n-7fzyVXnLK3EXbFHZCu6_UAlPDqo7qaKI9A/exec?kid=Quinn&t=" + Date.now();
    function sizeFrame() {
      var h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
      document.getElementById("app-frame").style.height = h + "px";
    }
    window.addEventListener("resize", sizeFrame);
    window.addEventListener("orientationchange", sizeFrame);
    if (window.visualViewport) { window.visualViewport.addEventListener("resize", sizeFrame); }
    sizeFrame();
    var _loader = document.getElementById("loader");
    var _loaderText = document.getElementById("loader-text");
    var _stalledTimer = setTimeout(function() {
      if (_loaderText) { _loaderText.textContent = "Still loading — hang tight…"; }
      if (_loader) { _loader.classList.add("loader--stalled"); }
    }, 8000);
    document.getElementById("app-frame").addEventListener("load", function() {
      clearTimeout(_stalledTimer);
      if (_loader) { _loader.classList.add("loader--hidden"); }
    });
  </script>
</body>
</html>
